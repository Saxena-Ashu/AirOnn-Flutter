name: airon
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.3
  dio: ^5.4.0
  flutter_map: ^6.1.0 # The Flutter alternative to Leaflet.js
  latlong2: ^0.9.0
  google_fonts: ^6.2.0
  syncfusion_flutter_datagrid: ^30.1.42
  syncfusion_flutter_core: ^30.1.42

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:


  uses-material-design: true
  assets: 
    - assets/fonts/

  fonts:
    - family : NotoEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji-Regular.ttf
